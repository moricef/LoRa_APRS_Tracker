<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRa APRS Tracker - Web Installer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      text-align: center;
    }
    h1 { color: #4CAF50; margin-bottom: 10px; }
    .subtitle { color: #888; margin-bottom: 40px; }
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
    }
    .card {
      background: #16213e;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 30px;
      width: 220px;
      text-decoration: none;
      color: #eee;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: #4CAF50;
      transform: translateY(-2px);
    }
    .card h2 { color: #81C784; margin: 0 0 10px 0; }
    .card p { color: #888; margin: 0; font-size: 0.9em; }
    .card.stable:hover { border-color: #4CAF50; }
    .card.devel:hover { border-color: #FF9800; }
    .card.devel h2 { color: #FFB74D; }
    .footer {
      margin-top: 60px;
      color: #666;
      font-size: 0.85em;
    }
    .footer a { color: #64B5F6; }
  </style>
</head>
<body>
  <h1>LoRa APRS Tracker</h1>
  <p class="subtitle">Web Installer — LVGL UI Edition by moricef</p>

  <div class="cards">
    <a href="stable.html" class="card stable">
      <h2>Stable</h2>
      <p>T-Deck Plus · CrowPanel 3.5"<br>v2.9.3 — 2026.04.30</p>
    </a>
    <a href="devel.html" class="card devel">
      <h2>Development</h2>
      <p>Latest experimental builds<br>May be unstable</p>
    </a>
  </div>

  <div class="footer">
    Fork by <a href="https://github.com/moricef/LoRa_APRS_Tracker">moricef</a>
    | Original <a href="https://github.com/richonguzman/LoRa_APRS_Tracker">CA2RXU</a>
  </div>
</body>
</html>
