[env:waveshare_s3_touch_lcd_7]
extends = env
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board_build.partitions = huge_app.csv
monitor_filters = esp32_exception_decoder
board = esp32-s3-devkitc1-n8r8
board_build.mcu = esp32s3
board_build.f_cpu = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.arduino.loop_stack_size = 16384
board_build.embed_files =
	data_embed/index.html.gz
	data_embed/style.css.gz
	data_embed/script.js.gz
	data_embed/bootstrap.css.gz
	data_embed/bootstrap.js.gz
	data_embed/favicon.png.gz
extra_scripts =
	pre:tools/compress.py
	pre:tools/copy_neogps_config.py
build_unflags =
	-std=gnu++11
	-Werror
build_flags =
	${common.build_flags}
	-std=gnu++17
	-Wno-error=discarded-qualifiers
	-Wno-builtin-macro-redefined
	-D WAVESHARE_S3_TOUCH_LCD_7
	-D CONFIG_LVGL_PORT_AVOID_TEARING_MODE=3
	-D CONFIG_LVGL_PORT_ROTATION_DEGREE=0
	-D CORE_DEBUG_LEVEL=4
	-include /home/fab2/.platformio/packages/framework-arduinoespressif32-libs/esp32s3/qio_opi/include/sdkconfig.h
	-I/home/fab2/.platformio/packages/framework-arduinoespressif32-libs/esp32s3/qio_opi/include
	-I/home/fab2/.platformio/packages/framework-arduinoespressif32/libraries/Network/src
	-D LORA_FREQ_MIN=410000000
	-D LORA_FREQ_MAX=525000000
	-D BOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=0
	-D CONFIG_SPIRAM_USE_MALLOC=1
	-D CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
	-D RADIOLIB_EXCLUDE_LR11X0=1
	-D RADIOLIB_EXCLUDE_SX127X=1
	-D RADIOLIB_EXCLUDE_SX128X=1
	; LVGL configuration
	-D USE_LVGL_UI
	-D LV_CONF_SKIP
	-D LV_COLOR_DEPTH=16
	-D LV_COLOR_16_SWAP=0
	-D LV_MEM_CUSTOM=1
	-D LV_MEM_CUSTOM_INCLUDE="\"lv_mem_custom.h\""
	-I include
	-D LV_TICK_CUSTOM=1
	-D LV_USE_LOG=0
	-D LV_HOR_RES_MAX=800
	-D LV_VER_RES_MAX=480
	-D LV_DPI_DEF=160
	-D LV_USE_PERF_MONITOR=0
	-D LV_USE_MEM_MONITOR=0
	-D LV_FONT_MONTSERRAT_12=1
	-D LV_FONT_MONTSERRAT_14=1
	-D LV_FONT_MONTSERRAT_18=1
	-D LV_FONT_MONTSERRAT_22=1
lib_deps =
	${common.lib_deps}
	lovyan03/LovyanGFX @ ^1.1.16
	lvgl/lvgl @ ^8.3.11
	bitbank2/JPEGDEC @ ^1.5.0
	bitbank2/PNGdec @ ^1.0.2
lib_extra_dirs =
	${PROJECT_DIR}/lib
