; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ttgo-t-beam-v1_2

extra_configs =
	common_settings.ini
  	variants/*/platformio.ini

[env]
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+

[env:esp32]
extends = env
platform = espressif32 @ 6.7.0
board_build.partitions = huge_app.csv
monitor_filters = esp32_exception_decoder
board_build.embed_files = 
	data_embed/index.html.gz
	data_embed/style.css.gz
	data_embed/script.js.gz
	data_embed/bootstrap.css.gz
	data_embed/bootstrap.js.gz
	data_embed/favicon.png.gz
extra_scripts = 
	pre:tools/compress.py
debug_tool = esp-prog

# Configuration pour les tests unitaires
[env:test_map_gps_filter]
platform = native  # Mode natif pour tests unitaires (pas d'ESP32 hardware)
framework = gtest  # Utilise gtest comme framework (pas Arduino)
build_flags =
    -Iinclude  # Headers du projet
    -Isrc  # Sources du projet
    -Itest  # Headers des mocks/tests
    -DTRACE_MAX_POINTS=100  # Définit la constante
    -DARDUINO=0  # Désactive les includes Arduino réels
    -DUNIT_TEST  # Active les mocks
lib_deps =
    google/googletest  # Google Test
build_src_filter =
    -<*>  # Exclut tout
    +<test/test_map_gps_filter.cpp>  # Inclut les tests
    +<src/map_gps_filter.cpp>  # Inclut l'implémentation à tester
test_ignore = *  # Optionnel : ignore d'autres tests si multi-env
